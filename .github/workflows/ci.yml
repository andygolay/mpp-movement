name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        type: string
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo update -p native-tls
      - run: cargo fmt --all -- --check
      - run: cargo clippy --features movement,server,client,axum,middleware,tower,utils -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo update -p native-tls
      - uses: taiki-e/install-action@cargo-hack

      # Movement tests (primary)
      - name: Test Movement features
        run: cargo test --features movement,server,client,axum,middleware,tower,utils

      # Movement integration tests (session lifecycle, crypto, etc.)
      - name: Test Movement integration
        run: cargo test --features movement,server,client --test integration_movement

      # Per-feature compilation check (skip features needing external deps)
      - name: Check each feature compiles
        run: cargo hack check --each-feature --no-dev-deps

  ci-gate:
    name: CI Gate
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi

